baseURL = "https://blog.efitz.net/"
languageCode = "en-us"
title = "efitz writings"
theme = "minimal"
enableRobotsTXT = true
enableGitInfo = true

[params]
  description = "Thoughts on technology, security, and whatever else is on my mind."

[menu]
  [[menu.main]]
    name = "Home"
    pageRef = "/"
    weight = 1
  [[menu.main]]
    name = "Projects"
    pageRef = "/projects"
    weight = 2
  [[menu.main]]
    name = "About"
    pageRef = "/about"
    weight = 3

[markup.goldmark.renderer]
  unsafe = true

[services.rss]
  limit = 20

# An explicit `lastmod` in front matter wins (used to pin migrated posts);
# otherwise the last git commit date is used automatically, then the publish date.
[frontmatter]
  lastmod = ["lastmod", ":git", "date"]
