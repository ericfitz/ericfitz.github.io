{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<section class="intro">{{ . }}</section>{{ end }}
  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
    <li>
      <time class="post-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
{{ end }}
